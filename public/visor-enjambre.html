<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Enjambre AR - Giroscopio</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      vr-mode-ui="enabled: false"
    >
      <a-entity
        animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear"
      >
        <a-entity
          gltf-model="/mariposas5.glb"
          scale="0.8 0.8 0.8"
          position="0 1.5 -3"
          animation-mixer
        ></a-entity>

        <a-entity
          gltf-model="/mariposas5.glb"
          scale="0.5 0.5 0.5"
          position="3 2 -2"
          rotation="0 -45 0"
          animation-mixer
        ></a-entity>

        <a-entity
          gltf-model="/mariposas5.glb"
          scale="0.6 0.6 0.6"
          position="-2.5 0.5 -1.5"
          rotation="0 45 0"
          animation-mixer
        ></a-entity>

        <a-entity
          gltf-model="/mariposas5.glb"
          scale="1 1 1"
          position="0 2 3"
          rotation="0 180 0"
          animation-mixer
        ></a-entity>
      </a-entity>

      <a-camera position="0 1.6 0" look-controls="enabled: true"></a-camera>
    </a-scene>
  </body>
</html>
